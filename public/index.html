<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Triage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-row">
      <h1>Agent Triage</h1>
      <div class="header-right">
        <span class="app-version" title="View changelog" onclick="openChangelogModal()"></span>
        <button class="settings-btn" title="Settings" onclick="toggleSettingsPanel()">&#x2699;</button>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="workspaces">Workspaces</button>
      <button class="tab" data-tab="loops">Loops</button>
      <button class="tab" data-tab="pulls">Pull Requests</button>
      <button class="tab" data-tab="tickets">Tickets</button>
    </nav>
  </header>
  <main id="queue"></main>
  <script src="overlay.js"></script>
  <script src="actions.js"></script>
  <script src="action-drawer.js"></script>
  <script src="tab-workspaces.js"></script>
  <script src="/tabs/loops.client.js"></script>
  <script src="/tabs/pulls.client.js"></script>
  <script src="/tabs/tickets.client.js"></script>
  <script src="changelog-modal.js"></script>
  <script src="settings-panel.js"></script>
  <script src="app.js"></script>
</body>
</html>
