name: CI

on:
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: |
          node -e "
            const c = JSON.parse(require('fs').readFileSync('config.example.json','utf8'));
            c.cmux = { binary: '/usr/bin/true', socket: '/tmp/cmux.sock' };
            require('fs').writeFileSync('config.json', JSON.stringify(c, null, 2));
          "

      - run: npm run version-check

      - run: npm test
